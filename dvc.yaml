stages:
  prepare:
    cmd: python src/pipeline/prepare.py
    deps:
      - data/raw
      - src/pipeline/prepare.py
    outs:
      - data/processed
  
  train:
    cmd: python src/models/train.py
    deps:
      - data/processed
      - src/models/train.py
    outs:
      - models/model.pkl
    metrics:
      - metrics.json:
          cache: false
